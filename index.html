<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan de Fuca Trail Access Atlas</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    header { padding: 0.8rem 1.2rem; background: #1b2a4a; color: white; }
    #map { flex: 1; }
    #stats { padding: 12px 16px; background: #f8f9fa; border-top: 2px solid #ddd; max-height: 160px; overflow-y: auto; }
    
    .popup-container { width: 220px; }
    .popup-title { font-size: 1.05rem; font-weight: bold; color: #1b2a4a; margin-bottom: 4px; }
    .popup-desc { font-size: 0.85rem; color: #444; margin-bottom: 8px; line-height: 1.3; }
    .popup-img { width: 100%; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <header>
    <h2 style="margin: 0; font-size: 1.25rem;">📍 Juan de Fuca Trail Atlas</h2>
  </header>

  <div id="map"></div>

  <div id="stats">
    <strong style="display:block; margin-bottom: 6px; color: #333;">📊 Loaded Trail Segments & Splits:</strong>
    <ul id="segment-list" style="margin: 0; padding-left: 20px;"></ul>
  </div>

  <script>
    // 1. Initialize Leaflet Map centered on JDF region
    const map = L.map('map').setView([48.48, -124.25], 11);

    // 2. OpenStreetMap Layer
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors',
      referrerPolicy: 'no-referrer-when-downgrade'
    }).addTo(map);

    // 3. Load Access Point Markers from data.json
    fetch('data.json')
      .then(res => res.json())
      .then(points => {
        points.forEach(pt => {
          const imgHtml = pt.photo ? `<img src="${pt.photo}" class="popup-img" alt="${pt.title}">` : '';
          const popupHtml = `
            <div class="popup-container">
              <div class="popup-title">${pt.title}</div>
              <div class="popup-desc">${pt.description}</div>
              ${imgHtml}
            </div>
          `;
          L.marker(pt.coords).addTo(map).bindPopup(popupHtml);
        });
      })
      .catch(err => console.log('data.json notice:', err));

    // 4. Upgraded GPX Loader (Cleans up default markers & labels)
    const segmentList = document.getElementById('segment-list');

    function addGpxTrack(gpxPath, customName, trackColor = '#e74c3c') {
      new L.GPX(gpxPath, {
        async: true,
        polyline_options: { color: trackColor, weight: 5, opacity: 0.85 },
        marker_options: {
          startIconUrl: null, // Hide internal GPX start marker icon
          endIconUrl: null,   // Hide internal GPX end marker icon
          shadowUrl: null
        }
      }).on('loaded', function(e) {
        const gpx = e.target;
        
        // Calculate metrics
        const distKm = (gpx.get_distance() / 1000).toFixed(2);
        const durationStr = gpx.get_duration_string(gpx.get_total_time(), false);

        // Bind custom click popup directly on the trail line
        gpx.bindPopup(`
          <div style="font-family: sans-serif;">
            <strong style="color: #1b2a4a; font-size: 1rem;">${customName}</strong><br>
            <b>Distance:</b> ${distKm} km<br>
            <b>Time:</b> ${durationStr || 'N/A'}
          </div>
        `);

        // Add to stats list below map
        const item = document.createElement('li');
        item.innerHTML = `<strong>${customName}</strong>: ${distKm} km | Elapsed Time: ${durationStr || 'N/A'}`;
        segmentList.appendChild(item);

        map.fitBounds(gpx.getBounds());
      }).addTo(map);
    }

    // -------------------------------------------------------------
    // YOUR GPX TRACKS (Name them whatever you want here!)
    // -------------------------------------------------------------
    addGpxTrack('gpx/Bear_Beach_JDF.gpx', 'Bear Beach Trail', '#e74c3c');
    addGpxTrack('gpx/Hoard_Creek_JDF.gpx', 'Hoard Creek Trail', '#2980b9');
    addGpxTrack('gpx/Lines_Creek_JDF.gpx', 'Lines Creek Trail', '#27ae60');
    addGpxTrack('gpx/Loss_Creek_JDF.gpx', 'Loss Creek Trail', '#8e44ad');

  </script>
</body>
</html>
